# Visual demo stack: Postgres + RabbitMQ. The "stop the broker"
# step in the demo physically stops the rabbitmq container.
#
#   docker-compose up -d
#   pnpm -C examples/externalization-with-fallback start
#   # When prompted: docker-compose stop rabbitmq
#   # Then press ENTER to continue the demo
#   docker-compose down -v
#
# `pnpm test:integration` does NOT need this stack — testcontainers
# spins up Postgres and the ClientProxy is mocked in jest.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 2s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'   # management UI for verifying queue contents
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ['CMD-SHELL', 'rabbitmq-diagnostics -q ping']
      interval: 5s
      timeout: 5s
      retries: 20
