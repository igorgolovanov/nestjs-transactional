services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: outbox
      POSTGRES_PASSWORD: outbox
      POSTGRES_DB: outbox
    ports:
      - '5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U outbox -d outbox']
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - outbox-example-data:/var/lib/postgresql/data

volumes:
  outbox-example-data:
