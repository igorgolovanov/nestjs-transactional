name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r --filter './packages/*' build

      - name: Test
        run: pnpm -r --filter './packages/*' test

      # changesets/action will either:
      #   - open (or update) a "Version Packages" PR that bumps versions
      #     and writes CHANGELOG.md entries — when unreleased `.changeset/*.md`
      #     files are present on `main`.
      #   - publish to npm — when the "Version Packages" PR has just been
      #     merged and `.changeset/*.md` files are already consumed.
      - name: Create Release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `actions/setup-node@v4` with `registry-url:` generates an
          # `.npmrc` that references `${NODE_AUTH_TOKEN}`. Both names
          # must point at the npm publish token — without
          # NODE_AUTH_TOKEN the .npmrc literal-expands to a placeholder
          # and `npm publish` 404s with "not in this registry".
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
