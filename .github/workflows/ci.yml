name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cross-package type resolution goes through `dist/*.d.ts`
      # (each package.json's `types` field). ESLint's
      # `projectService: true` parser needs those resolved or it
      # surfaces every cross-package import as "Unsafe call of a
      # type that could not be resolved". Build first.
      - name: Build
        run: pnpm -r --filter './packages/*' build

      - name: Lint
        run: pnpm -r --filter './packages/*' lint

  build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r --filter './packages/*' build

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ts-jest resolves `@nestjs-transactional/*` cross-package
      # imports through the package.json `types` / `main` paths,
      # which point at `dist/`. Without a build step a fresh
      # checkout fails with `TS2307: Cannot find module
      # '@nestjs-transactional/core'`.
      - name: Build
        run: pnpm -r --filter './packages/*' build

      - name: Test
        run: pnpm -r --filter './packages/*' test

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Per-package `tsc --noEmit` resolves cross-package imports
      # via `node_modules/@nestjs-transactional/*/dist/*.d.ts`.
      # Without a build, type-check sees only stale `.ts` source
      # without declaration outputs and bails on the first
      # cross-package import.
      - name: Build
        run: pnpm -r --filter './packages/*' build

      - name: Type check
        run: pnpm -r --filter './packages/*' exec tsc --noEmit

  test-integration:
    name: Integration tests (Node 22)
    runs-on: ubuntu-latest
    # ubuntu-latest ships with Docker — testcontainers spins up Postgres
    # per-suite. Currently `typeorm` and `outbox-typeorm` define
    # `test:integration`; pnpm filter-run skips packages without it.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r --filter './packages/*' build

      - name: Integration tests
        run: pnpm -r --filter './packages/*' test:integration
